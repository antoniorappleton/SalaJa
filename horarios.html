<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Horários - Ramalhão</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#003B73" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      rel="icon"
      type="image/png"
      href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Yellow_Star.svg/32px-Yellow_Star.svg.png"
    />
    <link
      rel="apple-touch-icon"
      href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Yellow_Star.svg/180px-Yellow_Star.svg.png"
    />
  </head>

  <body>
    <div class="app-layout">
      <!-- Sidebar (Desktop default / Mobile Drawer) -->
      <aside class="sidebar" id="appSidebar">
        <div class="sidebar-header">
          <div class="logo-wrapper">
            <img
              src="logo.svg"
              alt="SalaJá"
              style="width: 32px; height: auto"
            />
            <h2>SalaJá</h2>
          </div>
          <button class="icon-btn close-sidebar mobile-only" id="closeSidebar">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="sidebar-content">
          <div class="nav-section-title">Principal</div>
          <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"
              ><i data-lucide="layout-dashboard"></i> Dashboard</a
            >
            <a href="index.html" class="nav-link"
              ><i data-lucide="compass"></i> Explorar</a
            >
            <a href="reserva.html" class="nav-link"
              ><i data-lucide="calendar-plus"></i> Criar Reserva</a
            >
            <a href="calendario.html" class="nav-link"
              ><i data-lucide="calendar-days"></i> Calendário</a
            >
            <a href="horarios.html" class="nav-link active"
              ><i data-lucide="clock"></i> Horários</a
            >
            <a href="minhas-reservas.html" class="nav-link"
              ><i data-lucide="calendar-check"></i> As Minhas Reservas</a
            >
          </nav>
          <div class="nav-section-title mt-4">Conta</div>
          <nav class="sidebar-nav">
            <a href="perfil.html" class="nav-link"
              ><i data-lucide="user"></i> Perfil</a
            >
            <a href="definicoes.html" class="nav-link"
              ><i data-lucide="settings"></i> Definições</a
            >
            <a
              href="admin.html"
              class="nav-link"
              id="nav-admin"
              style="display: none"
              ><i data-lucide="shield-check"></i> Administração</a
            >
            <a
              href="login.html"
              class="nav-link text-danger"
              style="margin-top: auto"
              ><i data-lucide="log-out"></i> Terminar Sessão</a
            >
          </nav>
        </div>
      </aside>

      <!-- Overlay strictly for mobile -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Main Content Wrapper -->
      <div class="main-wrapper">
        <!-- Top App Bar -->
        <header class="top-bar">
          <div class="top-bar-left">
            <button class="icon-btn menu-btn mobile-only" id="openSidebar">
              <i data-lucide="menu"></i>
            </button>
            <h1 class="page-title mobile-only">Horários</h1>
            <div class="desktop-only text-muted">
              <h1 class="page-title text-navy">Consulta de Ocupação</h1>
              <p style="font-size: 0.9rem">
                Veja a disponibilidade em tempo real.
              </p>
            </div>
          </div>
          <div class="top-bar-right">
            <button class="icon-btn desktop-only" style="margin-right: 0.5rem">
              <i data-lucide="bell"></i>
            </button>
            <a href="perfil.html" class="profile-avatar">
              <i data-lucide="user" style="width: 20px; height: 20px"></i>
            </a>
          </div>
        </header>

        <!-- Scrollable Content -->
        <main class="content-area">
          <div
            class="auth-card animate-in"
            style="max-width: 800px; margin: 0 auto; padding: 2rem"
          >
            <div
              style="
                display: flex;
                gap: 1rem;
                margin-bottom: 2rem;
                align-items: flex-end;
              "
            >
              <div class="form-group" style="flex-grow: 1; margin: 0">
                <label for="filtro_espaco">Espaço</label>
                <select id="filtro_espaco" class="form-control">
                  <option value="todos">Todos os espaços</option>
                  <option value="ginasio_velho">Ginásio Velho</option>
                  <option value="ginasio_novo">Ginásio Novo</option>
                  <option value="sala_riscas">Sala das Riscas</option>
                  <option value="sala_carlo">Sala Carlo Acutis</option>
                  <option value="capela">Capela</option>
                  <option value="polidesportivo">Polidesportivo</option>
                  <option value="sala_profissional">
                    Sala do Profissional
                  </option>
                </select>
              </div>
              <div class="form-group" style="flex-grow: 1; margin: 0">
                <label for="filtro_data">Data</label>
                <input
                  type="date"
                  id="filtro_data"
                  class="form-control"
                  value="2026-03-09"
                />
              </div>
              <button
                class="btn btn-outline"
                style="
                  height: 52px;
                  padding: 0 1.5rem;
                  border-radius: var(--radius-md);
                "
              >
                <i data-lucide="search"></i>
              </button>
            </div>

            <div
              style="
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                overflow: hidden;
              "
            >
              <div
                style="
                  background-color: var(--color-bg);
                  padding: 1rem;
                  border-bottom: 1px solid var(--color-border);
                  font-weight: 600;
                "
                id="horariosDataTitulo"
              >
                Ocupações
              </div>
              <div id="horariosList">
                <!-- Ocupações listadas por JavaScript -->
              </div>
            </div>
          </div>
        </main>

        <!-- Bottom Navigation App Bar (Mobile Only) -->
        <nav class="bottom-nav mobile-only">
          <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">
              <i
                data-lucide="layout-dashboard"
                style="width: 22px; height: 22px"
              ></i>
            </div>
            <span>Início</span>
          </a>
          <a href="calendario.html" class="nav-item">
            <div class="nav-icon">
              <i
                data-lucide="calendar-days"
                style="width: 22px; height: 22px"
              ></i>
            </div>
            <span>Calendário</span>
          </a>
          <a href="index.html" class="nav-item">
            <div class="nav-icon">
              <i data-lucide="compass" style="width: 22px; height: 22px"></i>
            </div>
            <span>Explorar</span>
          </a>
          <a href="minhas-reservas.html" class="nav-item">
            <div class="nav-icon">
              <i data-lucide="list" style="width: 22px; height: 22px"></i>
            </div>
            <span>Lista</span>
          </a>
        </nav>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
