<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Calendário - SalaJá</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#003B73" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      .calendar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        background: var(--color-white);
        padding: 1rem;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
      }
      .calendar-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--color-navy);
        text-transform: capitalize;
      }
      .calendar-nav-btn {
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--color-navy);
        transition: var(--transition);
      }
      .calendar-nav-btn:hover {
        background: rgba(0, 59, 115, 0.05);
      }
      .calendar-grid {
        background: var(--color-white);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
      }
      .calendar-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        background: rgba(0, 59, 115, 0.03);
        border-bottom: 1px solid var(--color-border);
        text-align: center;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--color-text-muted);
        padding: 0.75rem 0;
      }
      .calendar-days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: minmax(80px, auto);
      }
      .calendar-day {
        border-right: 1px solid var(--color-border);
        border-bottom: 1px solid var(--color-border);
        padding: 0.5rem;
        font-size: 0.9rem;
        color: var(--color-text);
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        min-height: 80px;
      }
      .calendar-day:nth-child(7n) {
        border-right: none;
      }
      .calendar-day.empty {
        background: rgba(0, 0, 0, 0.02);
        cursor: default;
      }
      .calendar-day.today {
        background: rgba(0, 59, 115, 0.03);
      }
      .calendar-day.today .day-number {
        background: var(--color-navy);
        color: var(--color-white);
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }
      .calendar-day:hover:not(.empty) {
        background: rgba(0, 59, 115, 0.05);
      }
      .day-number {
        font-weight: 500;
        margin-bottom: 0.5rem;
        display: block;
      }
      .reservation-dot {
        font-size: 0.7rem;
        background: #10b981;
        color: white;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        margin-bottom: 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }
      .reservation-dot.pendente {
        background: #f59e0b;
      }
      .reservation-dot.rejeitada {
        background: #ef4444;
      }

      /* Modal para ver reservas do dia */
      .day-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 300;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        backdrop-filter: blur(2px);
      }
      .day-modal-overlay.open {
        display: flex;
      }
      .day-modal {
        background: var(--color-bg);
        width: 100%;
        max-width: 400px;
        border-radius: var(--radius-md);
        padding: 1.5rem;
        box-shadow: var(--shadow-lg);
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
      }
      .close-modal {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--color-text-muted);
        transition: var(--transition);
      }
      .close-modal:hover {
        color: var(--color-danger);
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="appSidebar">
        <div class="sidebar-header">
          <div class="logo-wrapper">
            <img
              src="logo.svg"
              alt="SalaJá"
              style="width: 32px; height: auto"
            />
            <h2>SalaJá</h2>
          </div>
          <button class="icon-btn close-sidebar mobile-only" id="closeSidebar">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="sidebar-content">
          <div class="nav-section-title">Principal</div>
          <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"
              ><i data-lucide="layout-dashboard"></i> Dashboard</a
            >
            <a href="index.html" class="nav-link"
              ><i data-lucide="compass"></i> Explorar</a
            >
            <a href="reserva.html" class="nav-link"
              ><i data-lucide="calendar-plus"></i> Criar Reserva</a
            >
            <a href="calendario.html" class="nav-link active"
              ><i data-lucide="calendar-days"></i> Calendário</a
            >
            <a href="horarios.html" class="nav-link"
              ><i data-lucide="clock"></i> Horários</a
            >
            <a href="minhas-reservas.html" class="nav-link"
              ><i data-lucide="calendar-check"></i> As Minhas Reservas</a
            >
          </nav>
          <div class="nav-section-title mt-4">Conta</div>
          <nav class="sidebar-nav">
            <a href="perfil.html" class="nav-link"
              ><i data-lucide="user"></i> Perfil</a
            >
            <a href="definicoes.html" class="nav-link"
              ><i data-lucide="settings"></i> Definições</a
            >
            <a
              href="admin.html"
              class="nav-link"
              id="nav-admin"
              style="display: none"
              ><i data-lucide="shield-check"></i> Administração</a
            >
            <a
              href="login.html"
              class="nav-link text-danger"
              style="margin-top: auto"
              ><i data-lucide="log-out"></i> Terminar Sessão</a
            >
          </nav>
        </div>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <div class="main-wrapper">
        <header class="top-bar">
          <div class="top-bar-left">
            <button class="icon-btn menu-btn mobile-only" id="openSidebar">
              <i data-lucide="menu"></i>
            </button>
            <h1 class="page-title mobile-only">Calendário</h1>
            <div class="desktop-only text-muted">
              <h1 class="page-title text-navy">Calendário de Reservas</h1>
              <p style="font-size: 0.9rem">Visão mensal das suas atividades.</p>
            </div>
          </div>
          <!-- top-bar-right -->
          <div class="top-bar-right">
            <button class="icon-btn desktop-only" style="margin-right: 0.5rem">
              <i data-lucide="bell"></i>
            </button>
            <a href="perfil.html" class="profile-avatar"
              ><i data-lucide="user" style="width: 20px; height: 20px"></i
            ></a>
          </div>
        </header>

        <main class="content-area">
          <div class="calendar-container animate-in">
            <div class="calendar-header">
              <button class="calendar-nav-btn" id="prevMonth">
                <i data-lucide="chevron-left"></i>
              </button>
              <div class="calendar-title" id="monthYearDisplay">--</div>
              <button class="calendar-nav-btn" id="nextMonth">
                <i data-lucide="chevron-right"></i>
              </button>
            </div>

            <div class="calendar-grid">
              <div class="calendar-weekdays">
                <div>Dom</div>
                <div>Seg</div>
                <div>Ter</div>
                <div>Qua</div>
                <div>Qui</div>
                <div>Sex</div>
                <div>Sáb</div>
              </div>
              <div class="calendar-days" id="calendarDays">
                <!-- JS will inject days here -->
              </div>
            </div>
          </div>
        </main>

        <nav class="bottom-nav mobile-only">
          <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">
              <i
                data-lucide="layout-dashboard"
                style="width: 22px; height: 22px"
              ></i>
            </div>
            <span>Início</span>
          </a>
          <a href="calendario.html" class="nav-item active">
            <div class="nav-icon">
              <i
                data-lucide="calendar-days"
                style="width: 22px; height: 22px"
              ></i>
            </div>
            <span>Calendário</span>
          </a>
          <a href="index.html" class="nav-item">
            <div class="nav-icon">
              <i data-lucide="compass" style="width: 22px; height: 22px"></i>
            </div>
            <span>Explorar</span>
          </a>
          <a href="minhas-reservas.html" class="nav-item">
            <div class="nav-icon">
              <i data-lucide="list" style="width: 22px; height: 22px"></i>
            </div>
            <span>Lista</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- Modal for showing reservations on a specific day -->
    <div class="day-modal-overlay" id="dayModal">
      <div class="day-modal">
        <button class="close-modal" id="closeModalBtn">
          <i data-lucide="x"></i>
        </button>
        <h3
          id="modalDateTitle"
          class="text-navy"
          style="
            margin-bottom: 1rem;
            padding-right: 2rem;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 0.5rem;
          "
        >
          Reservas
        </h3>
        <div id="modalReservasList" class="space-list"></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
