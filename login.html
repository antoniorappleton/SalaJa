<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Iniciar Sessão - SalaJá</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#F4F7FB" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="auth-container">
    <div class="auth-wrapper animate-in">
      <div class="auth-card">
        <!-- Back Button -->
        <a
          href="index.html"
          style="
            color: var(--color-text-muted);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-weight: 500;
          "
        >
          <i data-lucide="arrow-left" style="width: 20px; height: 20px"></i>
          Voltar
        </a>

        <div class="auth-header">
          <div class="auth-logo">
            <img
              src="logo.png"
              alt="SalaJá"
              style="width: 32px; height: auto"
            />
          </div>
          <h2>Bem-vindo(a) de volta</h2>
          <p class="text-muted" style="font-size: 0.95rem">
            Aceda à sua conta para gerir reservas.
          </p>
        </div>

        <form class="auth-form" action="#" method="POST">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="exemplo@colegio.pt"
              required
            />
          </div>

          <div class="form-group" style="margin-bottom: 1.5rem">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
              "
            >
              <label for="password" style="margin-bottom: 0"
                >Palavra-passe</label
              >
              <a
                href="#"
                style="
                  font-size: 0.85rem;
                  color: var(--color-navy);
                  font-weight: 600;
                "
                >Esqueceu-se?</a
              >
            </div>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn btn-submit" style="margin-top: 1rem">
            Entrar
          </button>
        </form>

        <div class="auth-links">
          Não tem conta?
          <a href="signup.html" class="missing-page" data-page="signup"
            >Registar-se</a
          >
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
